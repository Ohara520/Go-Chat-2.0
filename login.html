<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="color-scheme" content="light only">
<title>Go Chat - 登录</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: linear-gradient(160deg, #ede0f7 0%, #f5d6ed 50%, #fce4ec 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  padding-top: calc(24px + env(safe-area-inset-top));
}
.logo-area { text-align: center; margin-bottom: 40px; }
.logo-avatar {
  width: 80px; height: 80px; border-radius: 50%; object-fit: cover;
  border: 3px solid rgba(255,255,255,0.8);
  box-shadow: 0 8px 24px rgba(180,120,200,0.3); margin-bottom: 12px;
}
.logo-title { font-size: 24px; font-weight: 700; color: #6b3fa0; letter-spacing: 1px; }
.logo-sub { font-size: 13px; color: #a07ab8; margin-top: 4px; }
.card {
  background: rgba(255,255,255,0.85); backdrop-filter: blur(12px);
  border-radius: 24px; padding: 32px 24px; width: 100%; max-width: 380px;
  box-shadow: 0 8px 32px rgba(180,120,200,0.15);
}
.tabs {
  display: flex; background: #f3eaf9; border-radius: 12px;
  padding: 4px; margin-bottom: 28px;
}
.tab {
  flex: 1; text-align: center; padding: 8px; border-radius: 9px;
  font-size: 14px; font-weight: 600; color: #a07ab8; cursor: pointer; transition: all 0.2s;
}
.tab.active { background: white; color: #6b3fa0; box-shadow: 0 2px 8px rgba(180,120,200,0.2); }
.form-group { margin-bottom: 16px; }
label { display: block; font-size: 13px; color: #7a5a9a; margin-bottom: 6px; font-weight: 500; }
input {
  width: 100%; padding: 12px 16px; border: 1.5px solid #e8d5f5;
  border-radius: 12px; font-size: 15px; color: #3d2060; background: white;
  outline: none; transition: border-color 0.2s;
}
input:focus { border-color: #b07ad0; }
input::placeholder { color: #c9aee0; }
.btn {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, #b07ad0, #d4709a);
  color: white; border: none; border-radius: 14px; font-size: 16px;
  font-weight: 600; cursor: pointer; margin-top: 8px; transition: opacity 0.2s; letter-spacing: 0.5px;
}
.btn:active { opacity: 0.85; }
.btn:disabled { opacity: 0.6; cursor: not-allowed; }
.error-msg { color: #e05a8a; font-size: 13px; text-align: center; margin-top: 12px; min-height: 18px; }
.success-msg { color: #6b9e6b; font-size: 13px; text-align: center; margin-top: 12px; min-height: 18px; }
.footer-note { text-align: center; font-size: 12px; color: #b09ac8; margin-top: 24px; line-height: 1.6; }
</style>
</head>
<body>

<div class="logo-area">
  <img src="images/ghost-avatar.jpg" class="logo-avatar" alt="Ghost">
  <div class="logo-title">Go Chat</div>
  <div class="logo-sub">Simon "Ghost" Riley 在等你</div>
</div>

<div class="card">
  <div class="tabs">
    <div class="tab active" id="tab-login" onclick="switchTab('login')">登录</div>
    <div class="tab" id="tab-register" onclick="switchTab('register')">注册</div>
  </div>

  <div id="form-login">
    <div class="form-group">
      <label>邮箱</label>
      <input type="email" id="login-email" placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="login-password" placeholder="输入密码">
    </div>
    <button class="btn" id="login-btn" onclick="handleLogin()">登录</button>
    <div class="error-msg" id="login-error"></div>
  </div>

  <div id="form-register" style="display:none">
    <div class="form-group">
      <label>邮箱</label>
      <input type="email" id="reg-email" placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label>密码（至少6位）</label>
      <input type="password" id="reg-password" placeholder="设置密码">
    </div>
    <div class="form-group">
      <label>确认密码</label>
      <input type="password" id="reg-password2" placeholder="再输一次">
    </div>
    <button class="btn" id="reg-btn" onclick="handleRegister()">注册</button>
    <div class="error-msg" id="reg-error"></div>
    <div class="success-msg" id="reg-success"></div>
  </div>
</div>

<div class="footer-note">
  注册即表示同意服务条款<br>
  数据安全加密存储
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://siahkenfoofkjrgevgma.supabase.co';
const SUPABASE_KEY = 'sb_publishable_FNPLr9vwPZPrB4ifHBncXg_83CWekPD';
const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function checkSession() {
  const { data: { session } } = await sbClient.auth.getSession();
  if (session) window.location.href = '/';
}
checkSession();

function switchTab(tab) {
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('form-register').style.display = tab === 'register' ? 'block' : 'none';
}

async function handleLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  const btn = document.getElementById('login-btn');
  if (!email || !password) { errEl.textContent = '请填写邮箱和密码'; return; }
  btn.disabled = true; btn.textContent = '登录中...'; errEl.textContent = '';
  const { error } = await sbClient.auth.signInWithPassword({ email, password });
  if (error) {
    errEl.textContent = error.message.includes('Invalid') ? '邮箱或密码错误' : error.message;
    btn.disabled = false; btn.textContent = '登录';
  } else {
    window.location.href = '/';
  }
}

async function handleRegister() {
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  const password2 = document.getElementById('reg-password2').value;
  const errEl = document.getElementById('reg-error');
  const sucEl = document.getElementById('reg-success');
  const btn = document.getElementById('reg-btn');
  errEl.textContent = ''; sucEl.textContent = '';
  if (!email || !password) { errEl.textContent = '请填写完整信息'; return; }
  if (password.length < 6) { errEl.textContent = '密码至少6位'; return; }
  if (password !== password2) { errEl.textContent = '两次密码不一致'; return; }
  btn.disabled = true; btn.textContent = '注册中...';
  const { error } = await sbClient.auth.signUp({ email, password });
  if (error) {
    errEl.textContent = error.message.includes('already') ? '该邮箱已注册' : error.message;
    btn.disabled = false; btn.textContent = '注册';
  } else {
    sucEl.textContent = '注册成功！请查收验证邮件，验证后即可登录';
    btn.disabled = false; btn.textContent = '注册';
  }
}

document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const loginVisible = document.getElementById('form-login').style.display !== 'none';
  if (loginVisible) handleLogin(); else handleRegister();
});
</script>
</body>
</html>
