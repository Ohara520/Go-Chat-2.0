<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Go Chat · 账本</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --green-dark:  #1b4d2e;
  --green:       #2d6a45;
  --green-mid:   #3d8a5a;
  --green-light: #5aab76;
  --gold:        #c8922a;
  --gold-light:  #f0c860;
  --paper:       #fdf8ee;
  --paper2:      #f5edd8;
  --paper3:      #ede0c0;
  --ink:         #1a1206;
  --ink2:        #3d2e10;
  --ink3:        #7a6040;
  --ink4:        #b09060;
  --red:         #8b1a1a;
  --line:        rgba(180,140,80,0.25);
}

@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
@keyframes slideIn { from { opacity:0; transform:translateX(-12px); } to { opacity:1; transform:translateX(0); } }

html { height:100%; }
body {
  min-height:100%; background: var(--paper);
  font-family: 'Noto Serif SC', serif; color: var(--ink);
  background-image:
    linear-gradient(var(--line) 1px, transparent 1px);
  background-size: 100% 40px;
  background-attachment: local;
}

/* ===== 顶栏 ===== */
.topbar {
  background: linear-gradient(135deg, var(--green-dark) 0%, var(--green) 60%, var(--green-mid) 100%);
  position: sticky; top:0; z-index:100;
  box-shadow: 0 3px 16px rgba(27,77,46,0.35);
  padding: env(safe-area-inset-top) 0 0;
}
.topbar-inner {
  display: flex; align-items: center; justify-content: center;
  padding: 0 24px; min-height: 56px;
}
.topbar-brand { display:flex; align-items:center; gap:10px; }
.brand-icon {
  width:34px; height:34px; border-radius:9px;
  background: rgba(255,255,255,0.15);
  display:flex; align-items:center; justify-content:center;
  font-size:18px; border:1px solid rgba(255,255,255,0.2);
}
.brand-text {}
.brand-name {
  font-size:17px; font-weight:700; color:#f5e8c0;
  letter-spacing:3px; line-height:1.2;
  text-shadow: 0 1px 3px rgba(0,0,0,0.3);
}
.brand-sub { font-size:11px; color:rgba(245,232,192,0.55); font-family:'DM Mono',monospace; }

/* 日期栏独立一行 */
.date-bar-wrap {
  background: var(--green);
  border-bottom: 1px solid rgba(0,0,0,0.1);
  padding: 10px 20px;
  display: flex; align-items: center; justify-content: center; gap: 12px;
}
.topbar-date { display:none; }
.date-arrow {
  width:32px; height:32px; border-radius:8px;
  background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.18);
  color:#f5e8c0; font-size:15px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:background 0.15s;
}
.date-arrow:hover { background:rgba(255,255,255,0.22); }
.date-pill {
  background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2);
  border-radius:20px; padding:6px 20px; text-align:center;
}
.date-main { font-size:15px; font-weight:600; color:#f5e8c0; letter-spacing:1px; }
.date-week { font-size:10px; color:rgba(245,232,192,0.6); font-family:'DM Mono',monospace; margin-top:1px; }
.today-tag {
  font-size:11px; background:var(--gold); color:var(--green-dark);
  border:none; border-radius:20px; padding:5px 14px;
  font-weight:700; cursor:pointer; font-family:'Noto Serif SC',serif;
  transition:opacity 0.15s; white-space:nowrap;
}
.today-tag:hover { opacity:0.85; }

/* ===== 主内容 ===== */
.main { max-width:860px; margin:0 auto; padding:24px 16px 48px; }

/* ===== 汇总卡 ===== */
.summary {
  display:grid; grid-template-columns:1fr 1fr;
  gap:12px; margin-bottom:20px;
  animation: fadeIn 0.4s ease;
}
.sum-card {
  background: linear-gradient(135deg, var(--green-dark), var(--green));
  border-radius:14px; padding:18px 20px;
  box-shadow: 0 4px 16px rgba(27,77,46,0.2);
  position:relative; overflow:hidden;
}
.sum-card::before {
  content:''; position:absolute;
  top:-20px; right:-20px; width:80px; height:80px;
  border-radius:50%; background:rgba(255,255,255,0.06);
}
.sum-card::after {
  content:''; position:absolute;
  bottom:-30px; left:10px; width:60px; height:60px;
  border-radius:50%; background:rgba(255,255,255,0.04);
}
.sum-label { font-size:11px; color:rgba(245,232,192,0.6); font-family:'DM Mono',monospace; letter-spacing:1px; margin-bottom:6px; }
.sum-value { font-size:32px; font-weight:700; color:#f5e8c0; line-height:1; font-family:'DM Mono',monospace; }
.sum-value.revenue { color:var(--gold-light); }

/* ===== 新增表单 ===== */
.add-card {
  background:white; border:1px solid var(--paper3);
  border-radius:16px; margin-bottom:20px; overflow:hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  animation: fadeIn 0.4s ease 0.1s both;
}
.add-head {
  background: linear-gradient(90deg, var(--green-dark), var(--green));
  padding:12px 20px; display:flex; align-items:center; gap:8px;
}
.add-head-icon { font-size:16px; }
.add-head-text { font-size:13px; font-weight:600; color:#f5e8c0; letter-spacing:1px; }
.add-body { padding:18px 20px; }

.fg { display:flex; flex-direction:column; gap:5px; }
.fl { font-size:11px; color:var(--ink4); font-family:'DM Mono',monospace; letter-spacing:0.5px; }
.fi, .fs {
  padding:10px 13px; border-radius:9px;
  border:1.5px solid var(--paper3); background:var(--paper);
  color:var(--ink); font-size:13px; font-family:'Noto Serif SC',serif;
  outline:none; -webkit-appearance:none; transition:border-color 0.15s;
}
.fi:focus, .fs:focus { border-color:var(--green-mid); background:white; }
.fs option { background:white; }

.form-r2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px; }
.form-r3 { display:grid; grid-template-columns:2fr 1fr 1fr; gap:12px; margin-bottom:12px; }
@media(max-width:600px) { .form-r3 { grid-template-columns:1fr 1fr; } }

.record-btn {
  width:100%; padding:13px; border-radius:10px; border:none;
  background: linear-gradient(135deg, var(--green-dark), var(--green-mid));
  color:#f5e8c0; font-size:15px; font-weight:700;
  font-family:'Noto Serif SC',serif; letter-spacing:2px;
  cursor:pointer; transition:opacity 0.15s;
  box-shadow: 0 3px 10px rgba(27,77,46,0.25);
}
.record-btn:hover { opacity:0.9; }
.record-btn:active { opacity:0.8; }

/* ===== 账本表格 ===== */
.ledger-card {
  background:white; border:1px solid var(--paper3);
  border-radius:16px; overflow:hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  animation: fadeIn 0.4s ease 0.2s both;
}
.ledger-head {
  background: linear-gradient(90deg, var(--green-dark), var(--green));
  padding:12px 20px; display:flex; justify-content:space-between; align-items:center;
}
.ledger-head-title { font-size:13px; font-weight:600; color:#f5e8c0; letter-spacing:1px; }
.ledger-head-count { font-size:11px; color:rgba(245,232,192,0.6); font-family:'DM Mono',monospace; }

table { width:100%; border-collapse:collapse; }
thead tr { background:var(--paper2); }
th {
  font-size:11px; color:var(--ink3); font-family:'DM Mono',monospace;
  font-weight:500; letter-spacing:0.8px; text-transform:uppercase;
  padding:10px 14px; text-align:left;
  border-bottom:2px solid var(--paper3);
}
td {
  padding:13px 14px; font-size:13px;
  border-bottom:1px solid var(--line);
  vertical-align:middle;
}
tr:last-child td { border-bottom:none; }
tr.data-row { transition:background 0.1s; }
tr.data-row:hover td { background:rgba(45,106,69,0.04); }

.c-time { font-family:'DM Mono',monospace; font-size:12px; color:var(--ink4); white-space:nowrap; }
.c-email { font-family:'DM Mono',monospace; font-size:12px; color:var(--ink2); }
.c-amount { font-family:'DM Mono',monospace; font-weight:700; color:var(--green); white-space:nowrap; }
.c-plan {}
.plan-chip {
  display:inline-flex; align-items:center; gap:4px;
  padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600;
  background:rgba(45,106,69,0.1); color:var(--green); border:1px solid rgba(45,106,69,0.2);
}
.c-op { font-size:12px; color:var(--ink3); }
.c-note { font-size:12px; color:var(--ink4); max-width:130px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.del-btn {
  background:none; border:none; color:var(--paper3);
  font-size:13px; padding:3px 8px; border-radius:6px;
  cursor:pointer; transition:all 0.15s;
}
.del-btn:hover { color:var(--red); background:rgba(139,26,26,0.06); }

/* 合计行 */
.total-row td {
  background: linear-gradient(90deg, rgba(45,106,69,0.08), rgba(45,106,69,0.04)) !important;
  border-top:2px solid var(--paper3) !important;
  font-weight:700; font-family:'DM Mono',monospace;
  color:var(--green-dark);
}

.empty { text-align:center; padding:60px 20px; color:var(--ink4); }
.empty-icon { font-size:40px; margin-bottom:12px; }
.empty-text { font-size:13px; }

/* Toast */
.toast {
  position:fixed; bottom:28px; left:50%;
  transform:translateX(-50%) translateY(16px);
  border-radius:10px; padding:11px 20px;
  font-size:13px; font-weight:600; opacity:0;
  transition:all 0.28s cubic-bezier(.34,1.56,.64,1);
  pointer-events:none; white-space:nowrap; z-index:9999;
  box-shadow:0 6px 24px rgba(0,0,0,0.18);
  font-family:'Noto Serif SC',serif;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.toast.ok { background:var(--green-dark); color:#f5e8c0; }
.toast.err { background:var(--red); color:white; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="topbar-brand">
      <div class="brand-icon">📒</div>
      <div class="brand-text">
        <div class="brand-name">充值账本</div>
        <div class="brand-sub">Go Chat · 收款记录</div>
      </div>
    </div>

  </div>
  <div class="date-bar-wrap">
    <button class="date-arrow" onclick="changeDate(-1)">‹</button>
    <div class="date-pill">
      <div class="date-main" id="dateMain2"></div>
      <div class="date-week" id="dateWeek2"></div>
    </div>
    <button class="date-arrow" onclick="changeDate(1)">›</button>
    <button class="today-tag" onclick="goToday()">今天</button>
  </div>
</div>

<div class="main">

  <div class="summary">
    <div class="sum-card">
      <div class="sum-label">TODAY · REVENUE</div>
      <div class="sum-value revenue" id="statRev">¥0</div>
    </div>
    <div class="sum-card">
      <div class="sum-label">TODAY · ORDERS</div>
      <div class="sum-value" id="statOrd">0</div>
    </div>
  </div>

  <div class="add-card">
    <div class="add-head">
      <div class="add-head-icon">✏️</div>
      <div class="add-head-text">记一笔</div>
    </div>
    <div class="add-body">
      <div class="form-r3">
        <div class="fg">
          <div class="fl">邮箱</div>
          <input class="fi" id="fEmail" placeholder="user@qq.com" autocomplete="off" autocapitalize="none" autocorrect="off" type="email">
        </div>
        <div class="fg">
          <div class="fl">金额（元）</div>
          <input class="fi" id="fAmount" type="number" placeholder="8.8" step="0.1" min="0">
        </div>
        <div class="fg">
          <div class="fl">负责人</div>
          <input class="fi" id="fOperator" placeholder="Noah">
        </div>
      </div>
      <div class="form-r2">
        <div class="fg">
          <div class="fl">套餐</div>
          <select class="fs" id="fPlan">
            <option value="">选择套餐</option>
            <option value="轻聊包">轻聊包 · 150条 · ¥8.8</option>
            <option value="日常包">日常包 · 400条 · ¥19.9</option>
            <option value="沉浸包">沉浸包 · 900条 · ¥42.9</option>
            <option value="陪伴包">陪伴包 · 1800条 · ¥79.9</option>
            <option value="深度陪伴包">深度陪伴包 · 3000条 · ¥129</option>
            <option value="长期陪伴包">长期陪伴包 · 4500条 · ¥168</option>
            <option value="自定义">自定义</option>
          </select>
        </div>
        <div class="fg">
          <div class="fl">备注</div>
          <input class="fi" id="fNote" placeholder="支付宝 / 微信 / 其他">
        </div>
      </div>
      <button class="record-btn" onclick="addRecord()">记　账</button>
    </div>
  </div>

  <div class="ledger-card">
    <div class="ledger-head">
      <div class="ledger-head-title">📋 当日明细</div>
      <div class="ledger-head-count" id="ledgerCount">0 笔</div>
    </div>
    <div style="overflow-x:auto;">
      <table>
        <thead>
          <tr>
            <th>时间</th>
            <th>邮箱</th>
            <th>金额</th>
            <th>套餐</th>
            <th>负责人</th>
            <th>备注</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
      <div id="empty" class="empty" style="display:none;">
        <div class="empty-icon">🍃</div>
        <div class="empty-text">今日暂无记录</div>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const sb = supabase.createClient(
  'https://siahkenfoofkjrgevgma.supabase.co',
  'sb_publishable_FNPLr9vwPZPrB4ifHBncXg_83CWekPD'
);

let cur = new Date(); cur.setHours(0,0,0,0);

function changeDate(d) { cur.setDate(cur.getDate()+d); render(); load(); }
function goToday() { cur = new Date(); cur.setHours(0,0,0,0); render(); load(); }

function render() {
  const days = ['周日','周一','周二','周三','周四','周五','周六'];
  const isToday = cur.toDateString() === new Date().toDateString();
  const dateText = `${cur.getFullYear()}年${cur.getMonth()+1}月${cur.getDate()}日`;
  const weekText = days[cur.getDay()] + (isToday ? ' · 今天' : '');
  ['dateMain','dateMain2'].forEach(id => { const el=document.getElementById(id); if(el) el.textContent=dateText; });
  ['dateWeek','dateWeek2'].forEach(id => { const el=document.getElementById(id); if(el) el.textContent=weekText; });
}

function ds() {
  return `${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,'0')}-${String(cur.getDate()).padStart(2,'0')}`;
}

async function load() {
  const { data } = await sb.from('topup_records')
    .select('*').eq('date', ds())
    .order('created_at', { ascending: false })
    .catch(() => ({ data:[] }));

  const rows = data || [];
  const rev = rows.reduce((s,r) => s+(parseFloat(r.amount)||0), 0);
  document.getElementById('statRev').textContent = '¥' + rev.toFixed(1);
  document.getElementById('statOrd').textContent = rows.length;
  document.getElementById('ledgerCount').textContent = rows.length + ' 笔';

  const tbody = document.getElementById('tbody');
  const empty = document.getElementById('empty');

  if (!rows.length) { tbody.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';

  tbody.innerHTML = rows.map((r,i) => `
    <tr class="data-row" style="animation:slideIn 0.3s ease ${i*0.04}s both;">
      <td class="c-time">${fmt(r.created_at)}</td>
      <td class="c-email">${r.email||'—'}</td>
      <td class="c-amount">${r.amount ? '¥'+parseFloat(r.amount).toFixed(1) : '—'}</td>
      <td class="c-plan"><span class="plan-chip">🌿 ${r.plan_name||'—'}</span></td>
      <td class="c-op">${r.operator||'—'}</td>
      <td class="c-note" title="${r.note||''}">${r.note||'—'}</td>
      <td><button class="del-btn" onclick="del(${r.id})">✕</button></td>
    </tr>`).join('') + (rows.length>1 ? `
    <tr class="total-row">
      <td colspan="2">合　计</td>
      <td>¥${rev.toFixed(1)}</td>
      <td colspan="4">${rows.length} 笔</td>
    </tr>` : '');
}

async function addRecord() {
  const email = document.getElementById('fEmail').value.trim().toLowerCase();
  const amount = parseFloat(document.getElementById('fAmount').value)||null;
  const plan_name = document.getElementById('fPlan').value;
  const operator = document.getElementById('fOperator').value.trim()||null;
  const note = document.getElementById('fNote').value.trim()||null;

  if (!email) { toast('请输入邮箱',false); return; }
  if (!plan_name) { toast('请选择套餐',false); return; }

  const { error } = await sb.from('topup_records').insert({
    date: ds(), email, amount, plan_name, operator, note,
    created_at: new Date().toISOString()
  });
  if (error) { toast('保存失败',false); return; }
  ['fEmail','fAmount','fNote'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fPlan').value='';
  toast('✅ 已记账',true); load();
}

async function del(id) {
  if (!confirm('确认删除这条记录？')) return;
  await sb.from('topup_records').delete().eq('id',id);
  toast('已删除',true); load();
}

function fmt(s) {
  if (!s) return '—';
  const d = new Date(s);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

let _t=null;
function toast(msg,ok=true) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='toast show '+(ok?'ok':'err');
  if(_t) clearTimeout(_t); _t=setTimeout(()=>el.classList.remove('show'),3000);
}

render(); load();
</script>
</body>
</html>
