<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Go Chat</title>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/welcome.css">
<link rel="stylesheet" href="css/home.css">
<link rel="stylesheet" href="css/chat.css">
</head>
<body>
<div class="container">

  <!-- 启动页 -->
  <div class="screen" id="welcomeScreen">
    <div class="welcome-avatar">👻</div>
    <div class="welcome-title">Go Chat</div>
    <div class="welcome-subtitle">异国恋虚拟伴侣 💕</div>
    <div class="welcome-input-group">
      <input type="text" class="welcome-input" id="userNameInput" placeholder="输入你的昵称...">
      <button class="welcome-button" onclick="startChat()">开始聊天</button>
    </div>
  </div>

  <!-- 主页 -->
  <div class="screen" id="mainScreen">
    <div class="main-content">
      <div class="card card-large" onclick="openScreen('chatScreen')">
        <div class="card-icon">💬</div>
        <div class="card-title">聊天</div>
        <div class="card-desc">与Ghost聊天</div>
      </div>
      <div class="card" id="calendarCard" onclick="openScreen('calendarScreen')">
        <div class="card-icon" id="calendarCardIcon">🏰</div>
        <div class="card-title">纪念</div>
        <div class="card-desc" id="calendarCardDesc">结婚纪念日 🥂</div>
      </div>
      <div class="card" onclick="openScreen('collectionScreen')">
        <div class="card-icon">⭐</div>
        <div class="card-title">收藏</div>
        <div class="card-desc">珍贵时刻</div>
      </div>
      <div class="card" onclick="openScreen('marketScreen')">
        <div class="card-icon">🛒</div>
        <div class="card-title">超市</div>
        <div class="card-desc">买礼物</div>
      </div>
      <div class="card" id="walletCard" onclick="openScreen('walletScreen')">
        <div class="card-icon" id="walletCardIcon">💳</div>
        <div class="card-title">钱包</div>
        <div class="card-desc">虚拟币</div>
      </div>
      <div class="card achievement-card" onclick="openScreen('achievementScreen')">
        <div class="card-icon">🏆</div>
        <div class="card-title">成就</div>
        <div class="card-desc" id="mainAchievementDesc">解锁徽章</div>
      </div>
      <div class="card secret-card" onclick="openScreen('secretScreen')">
        <div class="card-icon">💌</div>
        <div class="card-title">秘密</div>
        <div class="card-desc">只有Ghost知道</div>
      </div>
      <div class="card work-card" onclick="openScreen('workScreen')">
        <div class="card-icon">⏱️</div>
        <div class="card-title">打工</div>
        <div class="card-desc" id="workCardDesc">赚点零花钱</div>
      </div>
      <div class="card vocab-card" onclick="openScreen('vocabScreen')">
        <div class="card-icon">📖</div>
        <div class="card-title">单词</div>
        <div class="card-desc" id="vocabCardDesc">跟Ghost学英语</div>
      </div>
    </div>
  </div>

  <!-- 聊天页 -->
  <div class="screen" id="chatScreen">
    <div class="chat-container">
      <div class="chat-header">
        <div class="chat-header-left">
          <button class="chat-back-btn" onclick="openScreen('mainScreen')" title="返回">‹</button>
          <div class="ghost-avatar" onclick="openScreen('profileScreen')" style="background:none;padding:0;overflow:visible;">
            <div style="width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,0.55);display:flex;align-items:center;justify-content:center;font-size:24px;">👻</div>
            <div class="online-indicator"></div>
          </div>
        </div>
        <div class="chat-header-center">
          <h3 id="chatBotName">Simon "Ghost" Riley</h3>
          <div class="chat-header-meta">
            <span id="botMood">🙂</span>
            <span class="chat-header-dot">·</span>
            <span id="botLocation">Hereford Base</span>
            <span class="chat-header-dot">·</span>
            <span id="botWeather">🌤️</span>
            <span id="botUKTime"></span>
          </div>
        </div>
        <div class="chat-header-actions">
          <button class="thought-btn" id="thoughtBtn" onclick="toggleThought()" title="他在想什么">💭</button>
          <button class="call-btn" title="视频通话">📹</button>
          <button class="call-btn" title="语音通话">📞</button>
        </div>
      </div>

      <!-- 思想气泡弹出 -->
      <div class="thought-bubble" id="thoughtBubble">
        <span id="thoughtText">...</span>
      </div>

      <div class="messages" id="messagesContainer"></div>

      <div class="input-area">
        <button class="transfer-btn" onclick="openTransfer()" title="转账">💸</button>
        <input type="text" class="input-field" id="chatInput" placeholder="输入消息..." onkeypress="handleKeyPress(event)">
        <button class="send-btn" onclick="sendMessage()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>

      <!-- 转账弹窗 -->
      <div class="transfer-overlay" id="transferOverlay" onclick="closeTransfer()"></div>
      <div class="transfer-modal" id="transferModal">
        <div class="transfer-modal-title">转账给 Ghost</div>
        <div class="transfer-modal-balance">余额：<span id="transferBalance">£0</span></div>
        <input type="number" class="transfer-input" id="transferAmount" placeholder="输入金额 £" min="1">
        <div class="transfer-modal-btns">
          <button class="transfer-cancel-btn" onclick="closeTransfer()">取消</button>
          <button class="transfer-confirm-btn" onclick="confirmTransfer()">发送</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 资料页 -->
  <div class="screen" id="profileScreen">
    <div class="profile-container">

      <!-- 顶部背景+返回 -->
      <div class="profile-header-bg">
        <button class="profile-back-btn" onclick="openScreen('chatScreen')">‹</button>
      </div>

      <!-- 头像区 -->
      <div class="profile-avatar-wrap">
        <div class="profile-avatar">👻</div>
        <div class="profile-online-dot"></div>
      </div>

      <!-- 基本信息 -->
      <div class="profile-info">
        <div class="profile-name" id="profileDisplayName">Simon Riley</div>
        <div class="profile-name-zh">西蒙·莱利</div>
        <div class="profile-tags">
          <span class="profile-tag">TF141</span>
          <span class="profile-tag">中尉</span>
          <span class="profile-tag" id="profileAge">35岁</span>
        </div>
      </div>

      <!-- 动态签名 -->
      <div class="profile-section">
        <div class="profile-section-label">签名</div>
        <div class="profile-signature" id="profileSignature">—</div>
      </div>

      <!-- 动态位置 -->
      <div class="profile-section">
        <div class="profile-section-label">位置</div>
        <div class="profile-location" id="profileLocation">Hereford Base</div>
      </div>

      <!-- 我的备注 -->
      <div class="profile-section">
        <div class="profile-section-label">我的备注</div>
        <input type="text" class="profile-remark-input" id="profileRemark"
          placeholder="给他起个备注..."
          onchange="saveRemark()"
          maxlength="20">
      </div>

      <!-- 进入情侣空间 -->
      <button class="profile-space-btn" onclick="openScreen('coupleScreen')">
        💑 进入情侣空间
      </button>

    </div>
  </div>

</div>
<script src="js/app.js"></script>
<script src="js/chat.js"></script>
</body>
</html>
